name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      install_cmdstan:
        description: "Install CmdStan in the published image"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      cmdstan_version:
        description: "Optional CmdStan version when install_cmdstan is true"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            INSTALL_EXTRAS=cmdstanpy,bridgestan,ray
            INSTALL_CMDSTAN=${{ github.event.inputs.install_cmdstan || 'false' }}
            CMDSTAN_VERSION=${{ github.event.inputs.cmdstan_version || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
