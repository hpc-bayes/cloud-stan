name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Run unit tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q

      - name: Compile Python sources
        run: python -m compileall -q src tests examples

  helm-render:
    name: Helm render
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Normalize Dask chart metadata filename
        run: |
          if [ ! -f stan_dask_chart/Chart.yaml ] && [ -f stan_dask_chart/chart.yaml ]; then
            cp stan_dask_chart/chart.yaml stan_dask_chart/Chart.yaml
          fi

      - name: Render Dask chart
        run: helm template cloud-stan-dask ./stan_dask_chart --values examples/cloud/aws/dask-values.yaml

      - name: Render Ray chart
        run: helm template cloud-stan-ray ./stan_ray_chart/ray_cluster --values examples/cloud/aws/ray-values.yaml

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - helm-render
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            INSTALL_EXTRAS=cmdstanpy,bridgestan,ray
            INSTALL_CMDSTAN=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
