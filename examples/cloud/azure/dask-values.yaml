serviceAccount:
  create: true
  annotations:
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

podLabels:
  azure.workload.identity/use: "true"

extraEnv:
  - name: AZURE_CLIENT_ID
    value: "00000000-0000-0000-0000-000000000000"

daskScheduler:
  image:
    repository: yourregistry.azurecr.io/cloud-stan-dask
    tag: "2026.05.0"

daskWorker:
  image:
    repository: yourregistry.azurecr.io/cloud-stan-dask
    tag: "2026.05.0"
  replicas: 4

stanJob:
  image:
    repository: yourregistry.azurecr.io/cloud-stan
    tag: "2026.05.0"
  env:
    - name: CLOUD_STAN_OUTPUT_URI
      value: https://youraccount.blob.core.windows.net/cloud-stan/results
